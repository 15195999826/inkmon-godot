      scroller.scrollLeft = clamp(contentX * (next / prev) - cx, 0, maxScrollLeft(scroller)); // 让光标下的点不动
      updateActiveProcessFromScroll(scroller);
      updateZoomLabel(scroller);
    }
    function updateZoomLabel(scroller) {
      const wrap = scroller.closest(".process-wrap");
      const pct = wrap && wrap.querySelector("[data-zoom-pct]");
      if (pct) pct.textContent = Math.round(carouselZoom * 100) + "%";
    }

    function maxScrollLeft(scroller) {
      return Math.max(0, scroller.scrollWidth - scroller.clientWidth);
    }

    function processFollow(scroller) {
      if (!scroller._follow) scroller._follow = { target: scroller.scrollLeft, raf: 0, last: 0, active: false };
      return scroller._follow;
    }

    // One continuous rAF chase toward f.target. Frame-rate-independent exponential
    // smoothing => a held key keeps pushing the target and the scroller glides without
    // ever restarting from a standstill. CSS scroll-behavior is "auto" so we are the
    // only animator (no double-animation fight with the browser).
    function runProcessFollow(scroller) {
      const f = processFollow(scroller);
      if (f.active) return;
      f.active = true;
      f.last = performance.now();
      const tau = 0.2; // seconds; larger = softer / longer settle
      const tick = (now) => {
        const dt = Math.min(0.064, Math.max(0, (now - f.last) / 1000)); // clamp dt so tab-away can't fling
        f.last = now;
        const cur = scroller.scrollLeft;
        let next = cur + (f.target - cur) * (1 - Math.exp(-dt / tau));
        if (Math.abs(f.target - next) < 0.5) next = f.target;
        if (next !== cur) scroller.scrollLeft = next;
        updateActiveProcessFromScroll(scroller);
        if (next !== f.target) {
          f.raf = requestAnimationFrame(tick);
        } else {
          f.raf = 0;
          f.active = false;
        }
      };
      f.raf = requestAnimationFrame(tick);
    }

    // Velocity-based panning for arrow keys: hold to glide the strip continuously at a
    // steady speed, release for a soft stop. No stages, no chunked jumps — just smooth
    // left/right travel. Its own rAF loop, mutually exclusive with the click-to-stage
    // follower above (each cancels the other so they never fight over scrollLeft).
    const heldDir = { left: false, right: false, up: false, down: false };
    let panScroller = null, panRaf = 0, panLast = 0, panVelX = 0, panVelY = 0, panFast = false;
    const PAN_SPEED = 1100; // px/s cruising speed while a key is held
    const PAN_TAU = 0.09;   // velocity smoothing => soft ramp-up and stop

    function stopPan() {
      heldDir.left = heldDir.right = heldDir.up = heldDir.down = false;
      if (panRaf) cancelAnimationFrame(panRaf);
      panRaf = 0; panScroller = null; panVelX = 0; panVelY = 0;
    }

    function maxScrollTop() {
      return Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    }

    function panTick(now) {
      const sc = panScroller;
      if (!sc || !sc.isConnected) { panRaf = 0; panScroller = null; return; }
      const dt = Math.min(0.064, Math.max(0, (now - panLast) / 1000));
      panLast = now;
      const boost = panFast ? 1.9 : 1;
      const k = 1 - Math.exp(-dt / PAN_TAU); // frame-rate-independent velocity easing
      // A/D：横向平移卷轴本体
      const dirX = (heldDir.right ? 1 : 0) - (heldDir.left ? 1 : 0);
      panVelX += (dirX * PAN_SPEED * boost - panVelX) * k;
      let left = sc.scrollLeft + panVelX * dt;
      const maxLeft = maxScrollLeft(sc);
      if (left <= 0) { left = 0; panVelX = 0; }
      else if (left >= maxLeft) { left = maxLeft; panVelX = 0; }
      sc.scrollLeft = left;
      updateActiveProcessFromScroll(sc);
      // W/S：纵向翻整页（卷轴本体 overflow-y 隐藏，高内容靠窗口滚动）
      const dirY = (heldDir.down ? 1 : 0) - (heldDir.up ? 1 : 0);
      panVelY += (dirY * PAN_SPEED * boost - panVelY) * k;
      if (dirY !== 0 || Math.abs(panVelY) > 0.5) {
        let top = window.scrollY + panVelY * dt;
        const maxTop = maxScrollTop();
        if (top <= 0) { top = 0; panVelY = 0; }
        else if (top >= maxTop) { top = maxTop; panVelY = 0; }
        window.scrollTo(window.scrollX, top);
      }
      if (dirX !== 0 || dirY !== 0 || Math.abs(panVelX) > 4 || Math.abs(panVelY) > 4) {
        panRaf = requestAnimationFrame(panTick);
      } else {
        panRaf = 0; panScroller = null; // idle + stopped => let the loop sleep
      }
    }

    function startPan(scroller) {
      if (scroller._follow && scroller._follow.raf) { // cancel any in-flight click-to-stage glide
        cancelAnimationFrame(scroller._follow.raf);
        scroller._follow.raf = 0;
        scroller._follow.active = false;
      }
      panScroller = scroller;
      if (!panRaf) { panLast = performance.now(); panRaf = requestAnimationFrame(panTick); }
    }

    // Absolute move for click-to-stage / initial positioning.
    function moveProcessScroll(scroller, left, instant) {
      const f = processFollow(scroller);
      const target = clamp(left, 0, maxScrollLeft(scroller));
      if (instant) {
        if (f.raf) cancelAnimationFrame(f.raf);
        f.active = false;
        f.target = target;
        scroller.scrollLeft = target;
        updateActiveProcessFromScroll(scroller);
        return;
      }
      f.target = target;
      runProcessFollow(scroller);
    }

    function scrollProcessToStage(pid, stage, behavior) {
      const scroller = app.querySelector(`[data-process-scroll][data-pid="${pid}"]`);
      const target = scroller && scroller.querySelector(`[data-process-stage="${stage}"]`);
      if (!scroller || !target) return;
      stopPan(); // a click-to-stage glide overrides any in-flight key panning
      setActiveProcessStage(pid, stage);
      scroller._activeStage = stage; // keep the change-guard cache in sync
      scroller.focus({ preventScroll: true });
      moveProcessScroll(scroller, scrollTargetLeft(scroller, target), behavior === "auto");
    }

    function processStages(scroller) {
      // Cache the stage element list on the scroller; render() rebuilds the DOM so a
      // fresh scroller element naturally has no cache => no stale refs to invalidate.
      if (!scroller._stages) scroller._stages = Array.from(scroller.querySelectorAll("[data-process-stage]"));
      return scroller._stages;
    }

    function updateActiveProcessFromScroll(scroller) {
      const pid = scroller.dataset.pid;
      const sections = processStages(scroller);
      if (!pid || !sections.length) return;
      const anchor = scroller.scrollLeft + scroller.clientWidth * 0.35;
      let best = sections[0];
      let bestDist = Math.abs(scrollTargetLeft(scroller, best) - anchor);
      for (let i = 1; i < sections.length; i++) {
        const dist = Math.abs(scrollTargetLeft(scroller, sections[i]) - anchor);
        if (dist < bestDist) { best = sections[i]; bestDist = dist; }
      }
      const stage = best.dataset.processStage;
      if (scroller._activeStage === stage) return; // only touch the DOM when the active stage truly changes
      scroller._activeStage = stage;
      setActiveProcessStage(pid, stage);
    }

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function updateLightboxTransform() {
      lightboxImgEl.style.transform = `translate3d(${lightboxState.x}px, ${lightboxState.y}px, 0) scale(${lightboxState.scale})`;
    }

    function resetLightboxTransform() {
      lightboxState.scale = 1;
      lightboxState.x = 0;
      lightboxState.y = 0;
      updateLightboxTransform();
    }

    function openLightbox(src, caption) {
      stopPan(); // 看大图时停掉卷轴平移：左右键不应再驱动背后的卷轴（含松手后的惯性滑动）
      resetLightboxTransform();
      lightboxImgEl.src = src;
      lightboxImgEl.alt = caption || "";
      lightboxCaptionEl.textContent = caption || src;
      lightboxEl.classList.add("open");
      lightboxEl.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightboxEl.classList.remove("open");
      lightboxEl.setAttribute("aria-hidden", "true");
      lightboxImgEl.removeAttribute("src");
      lightboxCaptionEl.textContent = "";
      resetLightboxTransform();
    }

    lightboxEl.addEventListener("click", (ev) => {
      if (ev.target === lightboxEl || ev.target.classList.contains("lb-close")) closeLightbox();
    });
    lightboxEl.addEventListener("wheel", (ev) => {
      if (!lightboxEl.classList.contains("open")) return;
      ev.preventDefault();
      const previous = lightboxState.scale;
      const next = clamp(previous * Math.exp(-ev.deltaY * 0.0015), 0.5, 8);
      if (next === previous) return;
      const rect = lightboxEl.getBoundingClientRect();
      const focusX = ev.clientX - rect.left - rect.width / 2;
      const focusY = ev.clientY - rect.top - rect.height / 2;
      const ratio = next / previous;
      lightboxState.x = focusX - (focusX - lightboxState.x) * ratio;
      lightboxState.y = focusY - (focusY - lightboxState.y) * ratio;
      lightboxState.scale = next;
      updateLightboxTransform();
    }, { passive: false });
    window.addEventListener("keydown", (ev) => {
      if (!lightboxEl.classList.contains("open")) return;
      if (ev.key === "Escape") {
        closeLightbox();
        return;
      }
      const step = ev.shiftKey ? 90 : 45;
      const key = ev.key.toLowerCase();
      if (key === "w") lightboxState.y -= step;
      else if (key === "s") lightboxState.y += step;
      else if (key === "a") lightboxState.x -= step;
      else if (key === "d") lightboxState.x += step;
      else return;
      ev.preventDefault();
      updateLightboxTransform();
    });

    const PAN_KEYS = { w: "up", a: "left", s: "down", d: "right" };
    window.addEventListener("keydown", (ev) => {
      const active = document.activeElement;
      const inInput = active && ["INPUT", "TEXTAREA", "SELECT"].includes(active.tagName);
      // 方向移动已迁移到 WASD：在画卷视图或看大图时，方向键一律不再驱动卷轴/页面
      if (!inInput && (state.view !== "home" || lightboxEl.classList.contains("open"))
          && ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(ev.key)) {
        ev.preventDefault();
        return;
      }
      if (lightboxEl.classList.contains("open")) return; // 大图开着：WASD 交给大图自己的平移 handler
      if (state.view === "home") return;
      if (inInput || ev.ctrlKey || ev.metaKey || ev.altKey) return;
      const dirName = PAN_KEYS[ev.key.toLowerCase()];
      if (!dirName) return;
      const scroller = (active && active.matches && active.matches("[data-process-scroll]") ? active : null)
        || app.querySelector(`[data-process-scroll][data-pid="${state.view}"]`)
        || app.querySelector("[data-process-scroll]");
      if (!scroller) return;
      ev.preventDefault();
      heldDir[dirName] = true;
      panFast = ev.shiftKey;
      scroller.focus({ preventScroll: true });
      startPan(scroller);
    });

    window.addEventListener("keyup", (ev) => {
      const dirName = PAN_KEYS[ev.key.toLowerCase()];
      if (dirName) heldDir[dirName] = false;
      if (!ev.shiftKey) panFast = false;
    });

    function wire() {
      document.querySelectorAll("[data-nav]").forEach((b) => b.onclick = () => setView(b.dataset.nav));
      // matrix segmented
      app.querySelectorAll('[data-seg="mtx-pipe"] button').forEach((b) => b.onclick = () => { state.matrix.pipeline = b.dataset.v; state.matrix.variant = null; render(); });
      app.querySelectorAll('[data-seg="mtx-var"] button').forEach((b) => b.onclick = () => { state.matrix.variant = b.dataset.v; render(); });
      app.querySelectorAll(".cell[data-cell]").forEach((c) => c.onclick = () => { const [p, v, t, s] = c.dataset.cell.split("|"); openTrace(p, v, t, s); });
      // trace controls
      app.querySelectorAll('[data-seg="trace-var"] button').forEach((b) => b.onclick = () => { state.sel[b.closest("[data-pid]").dataset.pid].variant = b.dataset.v; render(); });
      app.querySelectorAll(".tchip[data-tile]").forEach((b) => b.onclick = () => { state.sel[b.dataset.pid].tile = b.dataset.tile; render(); });
      app.querySelectorAll(".node[data-step]").forEach((b) => b.onclick = () => scrollProcessToStage(b.dataset.pid, b.dataset.step, "smooth"));
      app.querySelectorAll("[data-process-scroll]").forEach((scroller) => {
        let raf = 0;
        scroller.addEventListener("scroll", () => {
          if ((scroller._follow && scroller._follow.active) || panScroller === scroller) return; // a drive loop already syncs active stage
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => updateActiveProcessFromScroll(scroller));
        }, { passive: true });
        // 滚轮 = 整体缩放卷轴（以光标为中心）
        scroller.addEventListener("wheel", (ev) => {
          ev.preventDefault();
          const rect = scroller.getBoundingClientRect();
          setCarouselZoom(scroller, carouselZoom * Math.exp(-ev.deltaY * 0.0012), ev.clientX - rect.left);
        }, { passive: false });
        // 持久化：render 重建 DOM 后把当前缩放贴回
        const zoomEl = scroller.querySelector(".process-zoom");
        if (zoomEl && carouselZoom !== 1) zoomEl.style.zoom = String(carouselZoom);
        updateZoomLabel(scroller);
        const wrap = scroller.closest(".process-wrap");
        const resetBtn = wrap && wrap.querySelector("[data-zoom-reset]");
        if (resetBtn) resetBtn.onclick = () => {
          carouselZoom = 1;
          if (zoomEl) zoomEl.style.zoom = "1";
          scroller.scrollLeft = 0;
          window.scrollTo({ top: 0 });
          updateActiveProcessFromScroll(scroller);
          updateZoomLabel(scroller);
        };
      });
      // copy
      app.querySelectorAll(".copy[data-copy]").forEach((b) => b.onclick = () => { navigator.clipboard.writeText(b.dataset.copy).then(() => toast("已复制")); });
      // image zoom
      app.querySelectorAll("img").forEach((img) => img.onclick = (ev) => {
        ev.stopPropagation();
        const cap = img.alt || img.closest("figure")?.querySelector("figcaption")?.textContent || img.currentSrc || img.src;
        openLightbox(img.currentSrc || img.src, cap);
      });
      // search
      const s = document.getElementById("homeSearch");
      if (s) s.oninput = () => {
        state._q = s.value.trim().toLowerCase();
        const q = state._q;
        app.querySelectorAll(".mtx tbody tr").forEach((tr) => {
          const code = tr.querySelector("code");
          if (!code || tr.classList.contains("fam-row")) return;
          tr.style.display = !q || code.textContent.toLowerCase().includes(q) ? "" : "none";
        });
      };
    }

    window.addEventListener("hashchange", () => { state.view = (location.hash || "#home").slice(1) || "home"; render(); });

    fetch(withAssetVersion("pipeline_artifacts.json"), { cache: "no-store" })
      .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then((data) => {
        state.data = data;
        state.tileKind = Object.fromEntries(data.tiles.map((t) => [t.id, t.kind]));
        for (const p of data.pipelines) { state.sel[p.id].variant = p.default_variant; state.sel[p.id].stage = displayStages(p)[0]; }
        state.matrix.variant = getPipeline(state.matrix.pipeline).default_variant;
        buildMap();
        render();
      })
      .catch((e) => { app.className = "loading"; app.innerHTML = `读取 <code>pipeline_artifacts.json</code> 失败：${esc(e.message)}。请用本地 HTTP server 打开（项目根目录运行 <code>start_pipeline_artifacts_web.bat</code>）。`; });
  </script>
</body>
</html>
