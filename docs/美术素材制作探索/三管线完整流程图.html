<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>InkMon 三管线素材生产追踪页</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #efebe2;
      --surface: #fffdf8;
      --surface-2: #f7f2e8;
      --ink: #211d18;
      --muted: #70675b;
      --line: #d8cfc0;
      --accent: #9b4f2f;
      --accent-2: #2f6f7a;
      --ok: #286b3a;
      --warn: #a65628;
      --miss: #a53333;
      --shadow: 0 10px 28px rgba(45, 35, 22, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button, select {
      font: inherit;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 22px 18px;
      color: #f5efe4;
      background: #2a241e;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    aside h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.2;
    }

    aside p {
      margin: 0 0 18px;
      color: #d2c5b6;
      font-size: 13px;
    }

    .side-nav {
      display: grid;
      gap: 8px;
    }

    .tab-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 10px 12px;
      color: #f4eee4;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    .tab-button[aria-selected="true"] {
      background: #f5ead8;
      color: #241e18;
      border-color: #f5ead8;
    }

    main {
      padding: 28px;
      max-width: 1480px;
      width: 100%;
    }

    .hero {
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      max-width: 980px;
      color: var(--muted);
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.ok { color: var(--ok); border-color: rgba(40, 107, 58, 0.35); }
    .badge.missing { color: var(--miss); border-color: rgba(165, 51, 51, 0.35); }
    .badge.not_applicable { color: var(--warn); border-color: rgba(166, 86, 40, 0.35); }

    section {
      margin: 18px 0;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .muted {
      color: var(--muted);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    figure {
      margin: 0;
      background: #f6f1e8;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    figure img {
      display: block;
      width: 100%;
      height: auto;
      background: #eee9df;
    }

    figcaption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .control {
      display: grid;
      gap: 5px;
    }

    .control label {
      color: var(--muted);
      font-size: 12px;
    }

    select {
      min-width: 160px;
      height: 38px;
      padding: 0 10px;
      color: var(--ink);
      background: #fffdfa;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .timeline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 16px;
    }

    .stage-button {
      min-height: 38px;
      padding: 8px 12px;
      color: var(--muted);
      background: #f6f1e8;
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
    }

    .stage-button.active {
      color: #fffaf2;
      background: var(--accent);
      border-color: var(--accent);
    }

    .artifact-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.75fr);
      gap: 16px;
    }

    .stage-view {
      min-height: 380px;
      display: grid;
      place-items: center;
      background: #f4efe7;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .stage-view img {
      display: block;
      max-width: 100%;
      max-height: 720px;
      object-fit: contain;
    }

    .image-set {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .empty-stage {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .detail-card {
      padding: 14px;
      background: #f8f3ea;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }

    .path-list {
      display: grid;
      gap: 7px;
      margin: 10px 0;
    }

    code, .path {
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
    }

    .path {
      display: block;
      padding: 7px 8px;
      overflow-wrap: anywhere;
      background: #fffaf2;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: #574a3b;
    }

    pre {
      max-height: 360px;
      overflow: auto;
      margin: 10px 0 0;
      padding: 12px;
      background: #27221d;
      color: #f4ead9;
      border-radius: 6px;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fffaf2;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: #514437;
      background: #f1e8d9;
      font-weight: 650;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .warning-list {
      display: grid;
      gap: 8px;
    }

    .warning {
      padding: 10px 12px;
      color: #7f341d;
      background: #fff2e6;
      border: 1px solid #efc7ad;
      border-radius: 6px;
      font-size: 13px;
    }

    .loading {
      padding: 24px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
      }
      main { padding: 16px; }
      .grid-2, .grid-3, .artifact-layout { grid-template-columns: 1fr; }
      .stage-view { min-height: 260px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1>三管线素材追踪</h1>
      <p>从 texture-gen call 到 raw、fit、UV、mesh、bake、manifest、Godot 截图的可审计链路。</p>
      <nav class="side-nav" aria-label="pipeline tabs">
        <button class="tab-button" type="button" data-tab="overview" aria-selected="true">总览</button>
        <button class="tab-button" type="button" data-tab="hard" aria-selected="false">管线 A：硬边</button>
        <button class="tab-button" type="button" data-tab="bevel" aria-selected="false">管线 B：顶面倒角</button>
        <button class="tab-button" type="button" data-tab="patch" aria-selected="false">管线 C：面片</button>
      </nav>
    </aside>

    <main>
      <div class="hero">
        <h2>InkMon 地块素材三管线生产追踪页</h2>
        <p>这页不再手写素材路径；它读取同目录的 <code>pipeline_artifacts.json</code>，把每个 tile 在每条管线里的真实阶段产物串起来。</p>
        <div id="statusRow" class="status-row">
          <span class="badge">loading pipeline_artifacts.json</span>
        </div>
      </div>

      <div id="app" class="loading">正在读取 artifact index...</div>
    </main>
  </div>

  <script>
    const STAGE_LABELS = {
      ai_call: "AI call",
      raw: "raw",
      fit: "fit overlay",
      uv: "UV",
      mesh: "mesh preview",
      baked: "baked result",
      manifest: "manifest",
      godot_scene: "Godot scene",
    };

    const state = {
      data: null,
      activeTab: (location.hash || "#overview").slice(1) || "overview",
      selected: {
        hard: { tile: "grass_e0", variant: null, stage: "ai_call" },
        bevel: { tile: "grass_e0", variant: null, stage: "ai_call" },
        patch: { tile: "grass_e0", variant: null, stage: "ai_call" },
      },
    };

    const app = document.getElementById("app");
    const statusRow = document.getElementById("statusRow");
    const tabButtons = Array.from(document.querySelectorAll(".tab-button"));

    function repoUrl(path) {
      if (!path) return "";
      if (/^[a-zA-Z]:[\\/]/.test(path)) return "";
      return "../../" + path.split("\\").join("/");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function compactJson(value) {
      if (!value || Object.keys(value).length === 0) return "{}";
      return JSON.stringify(value, null, 2);
    }

    function artifactKey(a) {
      return `${a.pipeline}:${a.variant}:${a.tile_id}:${a.stage}`;
    }

    function artifactsByKey() {
      const map = new Map();
      for (const artifact of state.data.artifacts) {
        map.set(artifactKey(artifact), artifact);
      }
      return map;
    }

    function getPipeline(id) {
      return state.data.pipelines.find((pipeline) => pipeline.id === id);
    }

    function getArtifact(map, pipeline, variant, tile, stage) {
      return map.get(`${pipeline}:${variant}:${tile}:${stage}`);
    }

    function tileOptions() {
      return state.data.tiles.filter((tile) => tile.kind === "tile");
    }

    function statusBadge(status) {
      return `<span class="badge ${escapeHtml(status)}">${escapeHtml(status)}</span>`;
    }

    function renderImage(path, alt) {
      const url = repoUrl(path);
      if (!url) {
        return `<div class="empty-stage">外部路径不可直接预览：<br><code>${escapeHtml(path)}</code></div>`;
      }
      return `<img src="${escapeHtml(url)}" alt="${escapeHtml(alt)}">`;
    }

    function renderArtifactVisual(artifact) {
      if (!artifact) return `<div class="empty-stage">此阶段没有 artifact 记录。</div>`;
      if (artifact.status === "missing") {
        return `<div class="empty-stage">缺失：${escapeHtml(artifact.title || artifact.stage)}<br>${escapeHtml(artifact.notes || "")}</div>`;
      }
      if (artifact.kind === "image") {
        return renderImage(artifact.path, artifact.title || artifact.stage);
      }
      if (artifact.kind === "image_set") {
        const images = artifact.images || [];
        if (!images.length) return `<div class="empty-stage">image_set 还没有图片。</div>`;
        return `<div class="image-set">${images.map((image) => `
          <figure>
            ${renderImage(image.path, image.label)}
            <figcaption>${escapeHtml(image.label)}</figcaption>
          </figure>
        `).join("")}</div>`;
      }
      return `<div class="empty-stage">${escapeHtml(artifact.title || STAGE_LABELS[artifact.stage] || artifact.stage)}<br>${escapeHtml(artifact.notes || "")}</div>`;
    }

    function pathLine(label, value) {
      if (!value) return "";
      const url = repoUrl(value);
      const body = url
        ? `<a class="path" href="${escapeHtml(url)}">${escapeHtml(value)}</a>`
        : `<span class="path">${escapeHtml(value)}</span>`;
      return `<h4>${escapeHtml(label)}</h4>${body}`;
    }

    function renderArtifactDetails(artifact) {
      if (!artifact) {
        return `<div class="detail-card"><h3>无记录</h3><p class="muted">当前 pipeline / variant / tile / stage 没有 artifact。</p></div>`;
      }
      return `
        <div class="detail-card">
          <div class="status-row">
            ${statusBadge(artifact.status)}
            <span class="badge">${escapeHtml(artifact.kind)}</span>
            <span class="badge">${escapeHtml(artifact.stage)}</span>
          </div>
          <h3>${escapeHtml(artifact.title || STAGE_LABELS[artifact.stage] || artifact.stage)}</h3>
          <p class="muted">${escapeHtml(artifact.notes || "")}</p>
          <div class="path-list">
            ${pathLine("path", artifact.path)}
            ${pathLine("source_script", artifact.source_script)}
            ${pathLine("source_report", artifact.source_report)}
          </div>
          <h4>data</h4>
          <pre><code>${escapeHtml(compactJson(artifact.data || {}))}</code></pre>
        </div>`;
    }

    function renderOverview(map) {
      const overview = state.data.overview;
      const warnings = state.data.warnings || [];
      const defaultCalls = tileOptions().map((tile) => getArtifact(map, "hard", "current", tile.id, "ai_call"));
      const callRows = defaultCalls.map((artifact) => {
        const data = artifact?.data || {};
        return `
          <tr>
            <td><code>${escapeHtml(artifact?.tile_id)}</code></td>
            <td>${statusBadge(artifact?.status || "missing")}</td>
            <td><code>${escapeHtml(data.call_id || "missing")}</code></td>
            <td>${escapeHtml([data.quality, data.size].filter(Boolean).join(" / "))}</td>
            <td>${escapeHtml(data.duration_ms ? `${Math.round(data.duration_ms / 1000)}s` : "")}</td>
          </tr>`;
      }).join("");
      const variantRows = state.data.pipelines.flatMap((pipeline) =>
        pipeline.variants.map((variant) => `
          <tr>
            <td>${escapeHtml(pipeline.label)}</td>
            <td><code>${escapeHtml(variant.id)}</code></td>
            <td><code>${escapeHtml(variant.asset_dir)}</code></td>
            <td><code>${escapeHtml(variant.scene)}</code></td>
            <td><code>${escapeHtml(variant.bake_report)}</code></td>
          </tr>`)
      ).join("");
      return `
        <article id="tab-overview" class="panel active">
          <section>
            <h3>当前结果入口</h3>
            <div class="grid-2">
              <figure>${renderImage(overview.final_compare, "三管线最终对比")}<figcaption>三条管线当前 Godot 场景对比。</figcaption></figure>
              <figure>${renderImage(overview.raw_contact, "AI raw contact")}<figcaption>12 张 terrain raw 输入。</figcaption></figure>
              <figure>${renderImage(overview.standard_uv_contact, "standard UV contact")}<figcaption>硬边使用的 standard design_warp UV。</figcaption></figure>
              <figure>${renderImage(overview.beveled_uv_contact, "wide rim beveled UV contact")}<figcaption>倒角 wide_rim 使用的 beveled UV。</figcaption></figure>
              <figure>${renderImage(overview.patch_contact, "patch contact")}<figcaption>面片 fit 后透明 patch。</figcaption></figure>
            </div>
          </section>

          <section>
            <h3>texture-gen 台账</h3>
            <table>
              <thead><tr><th>tile</th><th>status</th><th>call</th><th>quality / size</th><th>duration</th></tr></thead>
              <tbody>${callRows}</tbody>
            </table>
          </section>

          <section>
            <h3>variant matrix</h3>
            <table>
              <thead><tr><th>pipeline</th><th>variant</th><th>baked_dir</th><th>scene</th><th>bake report</th></tr></thead>
              <tbody>${variantRows}</tbody>
            </table>
          </section>

          <section>
            <h3>显式 warning</h3>
            <div class="warning-list">
              ${warnings.length ? warnings.map((warning) => `<div class="warning"><code>${escapeHtml(warning.tile_id || warning.pipeline || "")}</code> ${escapeHtml(warning.message)}</div>`).join("") : "<p class='muted'>无 warning。</p>"}
            </div>
          </section>
        </article>`;
    }

    function renderPipeline(pipelineId, map) {
      const pipeline = getPipeline(pipelineId);
      const selected = state.selected[pipelineId];
      if (!selected.variant) selected.variant = pipeline.default_variant;
      const variant = pipeline.variants.find((item) => item.id === selected.variant) || pipeline.variants[0];
      selected.variant = variant.id;
      if (!pipeline.stages.includes(selected.stage)) selected.stage = pipeline.stages[0];
      const artifact = getArtifact(map, pipeline.id, selected.variant, selected.tile, selected.stage);

      const tileSelect = `
        <div class="control">
          <label for="${pipelineId}-tile">tile</label>
          <select id="${pipelineId}-tile" data-pipeline="${pipelineId}" data-control="tile">
            ${tileOptions().map((tile) => `<option value="${escapeHtml(tile.id)}" ${tile.id === selected.tile ? "selected" : ""}>${escapeHtml(tile.id)}</option>`).join("")}
          </select>
        </div>`;
      const variantSelect = `
        <div class="control">
          <label for="${pipelineId}-variant">variant</label>
          <select id="${pipelineId}-variant" data-pipeline="${pipelineId}" data-control="variant">
            ${pipeline.variants.map((item) => `<option value="${escapeHtml(item.id)}" ${item.id === selected.variant ? "selected" : ""}>${escapeHtml(item.label)}</option>`).join("")}
          </select>
        </div>`;

      const timeline = pipeline.stages.map((stage) => {
        const item = getArtifact(map, pipeline.id, selected.variant, selected.tile, stage);
        const status = item?.status || "missing";
        return `<button class="stage-button ${stage === selected.stage ? "active" : ""}" type="button" data-pipeline="${pipelineId}" data-stage="${escapeHtml(stage)}">
          ${escapeHtml(STAGE_LABELS[stage] || stage)} · ${escapeHtml(status)}
        </button>`;
      }).join("");

      return `
        <article id="tab-${pipelineId}" class="panel">
          <section>
            <h3>${escapeHtml(pipeline.label)}</h3>
            <p class="muted">${pipelineId === "patch"
              ? "面片管线没有 Blender mesh；它审计 raw 清底、fit/anchor、透明 patch、manifest 和 Godot 场景。"
              : "此管线审计 texture-gen raw、几何 overlay、UV、真实 Blender model preview、baked PNG、manifest 和 Godot 场景。"
            }</p>
            <div class="controls">${tileSelect}${variantSelect}</div>
            <div class="timeline">${timeline}</div>
            <div class="artifact-layout">
              <div class="stage-view">${renderArtifactVisual(artifact)}</div>
              ${renderArtifactDetails(artifact)}
            </div>
          </section>
        </article>`;
    }

    function render() {
      const map = artifactsByKey();
      statusRow.innerHTML = `
        <span class="badge ok">artifacts: ${state.data.artifacts.length}</span>
        <span class="badge ${state.data.warnings.length ? "not_applicable" : "ok"}">warnings: ${state.data.warnings.length}</span>
        <span class="badge">generated: ${escapeHtml(state.data.generated_at)}</span>
        <span class="badge">schema v${state.data.schema_version}</span>`;

      app.className = "";
      app.innerHTML = [
        renderOverview(map),
        renderPipeline("hard", map),
        renderPipeline("bevel", map),
        renderPipeline("patch", map),
      ].join("");
      wireEvents();
      selectTab(state.activeTab, false);
    }

    function selectTab(tab, updateHash = true) {
      const valid = ["overview", "hard", "bevel", "patch"].includes(tab) ? tab : "overview";
      state.activeTab = valid;
      for (const button of tabButtons) {
        button.setAttribute("aria-selected", String(button.dataset.tab === valid));
      }
      for (const panel of document.querySelectorAll(".panel")) {
        panel.classList.toggle("active", panel.id === `tab-${valid}`);
      }
      if (updateHash) history.replaceState(null, "", `#${valid}`);
    }

    function wireEvents() {
      for (const select of document.querySelectorAll("select[data-pipeline]")) {
        select.addEventListener("change", () => {
          const pipeline = select.dataset.pipeline;
          const control = select.dataset.control;
          state.selected[pipeline][control] = select.value;
          render();
        });
      }
      for (const button of document.querySelectorAll(".stage-button")) {
        button.addEventListener("click", () => {
          state.selected[button.dataset.pipeline].stage = button.dataset.stage;
          render();
        });
      }
    }

    for (const button of tabButtons) {
      button.addEventListener("click", () => selectTab(button.dataset.tab));
    }

    window.addEventListener("hashchange", () => selectTab((location.hash || "#overview").slice(1), false));

    fetch("pipeline_artifacts.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        state.data = data;
        for (const pipeline of data.pipelines) {
          if (state.selected[pipeline.id]) {
            state.selected[pipeline.id].variant = pipeline.default_variant;
            state.selected[pipeline.id].stage = pipeline.stages[0];
          }
        }
        render();
      })
      .catch((error) => {
        app.className = "loading";
        app.innerHTML = `读取 <code>pipeline_artifacts.json</code> 失败：${escapeHtml(error.message)}。请通过本地 HTTP server 打开此页，例如 <code>python -m http.server 8766</code>。`;
      });
  </script>
</body>
</html>
